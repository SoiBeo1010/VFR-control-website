<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS System - Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <img src="/logo.png" alt="VFR Logo" style="height: 80px; width: auto; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
            </div>
            <h1 class="login-title">QMS System</h1>
            <p style="text-align: center; color: #6b7280; margin-bottom: 2rem;">Quality Management System</p>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                    Login
                </button>
            </form>
            
            <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;">
                <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 1rem;">
                    <strong>Demo Credentials:</strong>
                </p>
                <div style="background-color: #f9fafb; padding: 0.75rem; border-radius: 0.375rem; font-size: 0.85rem; line-height: 1.8;">
                    <div><strong>QC Worker:</strong> qc_worker_1 / password123</div>
                    <div><strong>QC Manager:</strong> qc_manager_1 / password123</div>
                    <div><strong>Prod Manager:</strong> prod_manager_1 / password123</div>
                    <div><strong>Prod Worker:</strong> prod_worker_1 / password123</div>
                    <div><strong>Higher Dept:</strong> higher_dept_1 / password123</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    
                    // Redirect based on role
                    const roleMap = {
                        'QC Worker': '/qc-worker.html',
                        'QC Manager': '/qc-manager.html',
                        'Production Manager': '/production-manager.html',
                        'Production Worker': '/production-worker.html',
                        'Higher Department': '/higher-department.html'
                    };
                    
                    window.location.href = roleMap[data.role] || '/dashboard.html';
                } else {
                    const error = await response.json();
                    showAlert('Invalid credentials', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Make sure FastAPI server is running.', 'error');
            }
        });

        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);
        }

        // Initialize database on page load
        window.addEventListener('load', async () => {
            try {
                await fetch(`${API_BASE}/init-db`);
                console.log('Database initialized');
            } catch (error) {
                console.error('Could not initialize database:', error);
            }
        });
    </script>
</body>
</html>
